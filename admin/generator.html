<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Generator</title>
</head>
<body>

<textarea id="input"></textarea>
<button onclick="generateCSV()">GO</button>
<textarea id="output"></textarea>

<script>
function parseTelegramToCSV(text) {
  const lines = text.split("\n").map(l => l.trim()).filter(l => l.length > 0);

  let category = "";
  let id = 1;
  const rows = [];

  const categoryRegex = /^[📱🖥💻⌚🎧]\s*(.+)$/i;
  const productRegex = /^(.+?)\s+(\d+(?:TB|GB)?)\s+([\wА-Яа-я+]+)\s+([\w+]+)\s*-\s*(\d+)\s*BYN/i;

  for (const line of lines) {
    const catMatch = line.match(categoryRegex);
    if (catMatch) {
      category = catMatch[1].trim();
      continue;
    }

    const prodMatch = line.match(productRegex);
    if (prodMatch) {
      rows.push({
        id: id++,
        category,
        name: prodMatch[1].trim(),
        memory: prodMatch[2].trim(),
        color: prodMatch[3].trim(),
        sim: prodMatch[4].trim(),
        price: prodMatch[5].trim()
      });
    }
  }

  let csv = "id,category,name,memory,color,sim,price\n";
  rows.forEach(r => {
    csv += `${r.id},${r.category},${r.name},${r.memory},${r.color},${r.sim},${r.price}\n`;
  });

  return csv;
}

function generateCSV() {
  const text = document.getElementById("input").value;
  const csv = parseTelegramToCSV(text);
  document.getElementById("output").value = csv;
}
</script>

</body>
</html>
