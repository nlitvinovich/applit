<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>CSV Generator</title>
<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
textarea { width:100%; height:350px; padding:10px; border-radius:8px; border:1px solid #ccc; }
button { padding:10px 20px; border:none; background:#0071e3; color:#fff; border-radius:6px; cursor:pointer; margin-right:10px; }
button:hover { background:#005bb5; }
</style>
</head>

<body>

<h2>Telegram → CSV Generator</h2>

<textarea id="input" placeholder="Вставь текст из Telegram"></textarea>
<br><br>
<button onclick="generateCSV()">Сгенерировать CSV</button>
<button onclick="copyCSV()">Скопировать CSV</button>
<br><br>
<textarea id="output" placeholder="CSV результат"></textarea>

<script>

// Удаляем HTML, эмодзи, символы �
function clean(text) {
  return text
    .replace(/<[^>]+>/g, "")
    .replace(/[\u{1F300}-\u{1FAFF}]/gu, "")
    .replace(/[\uFFFD]/g, "")
    .replace(/\s+/g, " ")
    .replace(/\n\s+/g, "\n")
    .trim();
}

// Определение категории
function detectCategory(line) {
  if (/iPhone/i.test(line)) return "iPhone";
  if (/iPad/i.test(line)) return "iPad";
  if (/MacBook/i.test(line)) return "MacBook";
  if (/AirPods/i.test(line)) return "AirPods";
  if (/Watch|SE3|S11/i.test(line)) return "Watch";
  return null;
}

// Определение модели
function detectModel(category, name) {
  if (!category) return "";
  const base = category.split("/")[0].trim();
  const device = base.split(" ")[0];
  return device + " " + name.split(" ")[0];
}

// Парсер строки товара
function parseProduct(line) {
  const regex = /^(.+?)\s+(\d+(?:TB|GB|\/\d+|\d+))\s+([\wА-Яа-я+]+)\s+([\w+]+)\s*[-–—]\s*(\d+)\s*BYN/i;
  const m = line.match(regex);
  if (!m) return null;

  return {
    name: m[1].trim(),
    memory: m[2].trim(),
    color: m[3].trim(),
    sim: m[4].trim(),
    price: m[5].trim()
  };
}

function generateCSV() {
  const raw = document.getElementById("input").value;
  const text = clean(raw);

  const lines = text.split("\n").map(l => l.trim()).filter(l => l.length > 0);

  let category = "";
  let id = 1;
  const rows = [];

  for (const line of lines) {

    const cat = detectCategory(line);
    if (cat) {
      category = line.replace(/📱|🖥|🔥/g, "").trim();
      continue;
    }

    const prod = parseProduct(line);
    if (prod) {
      const model = detectModel(category, prod.name);
      rows.push({
        id: id++,
        category,
        model,
        name: prod.name,
        memory: prod.memory,
        color: prod.color,
        sim: prod.sim,
        price: prod.price
      });
    }
  }

  let csv = "id,category,model,name,memory,color,sim,price\n";
  rows.forEach(r => {
    csv += `${r.id},${r.category},${r.model},${r.name},${r.memory},${r.color},${r.sim},${r.price}\n`;
  });

  document.getElementById("output").value = csv;
}

function copyCSV() {
  const out = document.getElementById("output");
  out.select();
  document.execCommand("copy");
}

</script>

</body>
</html>
