<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Model → Price CSV Generator</title>
<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
textarea { width:100%; height:350px; padding:10px; border-radius:8px; border:1px solid #ccc; }
button { padding:10px 20px; border:none; background:#0071e3; color:#fff; border-radius:6px; cursor:pointer; margin-right:10px; }
button:hover { background:#005bb5; }
</style>
</head>

<body>

<h2>Model → Price CSV Generator</h2>

<textarea id="input" placeholder="Вставь HTML из Telegram Web"></textarea>
<br><br>
<button onclick="generateCSV()">Сгенерировать CSV</button>
<button onclick="copyCSV()">Скопировать CSV</button>
<br><br>
<textarea id="output" placeholder="CSV результат"></textarea>

<script>

// Очистка HTML Telegram Web
function clean(text) {
  return text
    .replace(/<[^>]+>/g, "")              // HTML теги
    .replace(/[\u{1F300}-\u{1FAFF}]/gu, "") // эмодзи
    .replace(/[\uFFFD]/g, "")             // битые символы
    .replace(/\s+/g, " ")
    .replace(/\n\s+/g, "\n")
    .trim();
}

// Цена
function extractPrice(line) {
  const m = line.match(/(\d+)\s*BYN/i);
  return m ? m[1] : null;
}

// Модель = вся строка до цены
function extractModel(line) {
  return line.replace(/[-–—]\s*\d+\s*BYN/i, "").trim();
}

function generateCSV() {
  const raw = document.getElementById("input").value;
  const text = clean(raw);

  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);

  let id = 1;
  const rows = [];

  for (const line of lines) {
    const price = extractPrice(line);
    if (!price) continue;

    const model = extractModel(line);

    rows.push({ id: id++, model, price });
  }

  let csv = "id,model,price\n";
  rows.forEach(r => {
    csv += `${r.id},${r.model},${r.price}\n`;
  });

  document.getElementById("output").value = csv;
}

function copyCSV() {
  const out = document.getElementById("output");
  out.select();
  document.execCommand("copy");
}

</script>

</body>
</html>
