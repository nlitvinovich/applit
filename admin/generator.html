<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NLAppleLab CSV Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  background: #f5f5f5;
}

textarea {
  width: 100%;
  height: 300px;
  padding: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
  margin-bottom: 20px;
}

button {
  background: #0071e3;
  color: white;
  padding: 12px 20px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #005bb5;
}

#output {
  margin-top: 20px;
  white-space: pre;
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<h2>Генератор CSV для NLAppleLab</h2>

<textarea id="input" placeholder="Вставь сюда весь Telegram-пост (даже HTML)"></textarea>

<button onclick="generateCSV()">Сгенерировать CSV</button>

<pre id="output"></pre>

<script>
function generateCSV() {
  let raw = document.getElementById('input').value;

  // 1) Удаляем HTML-теги
  raw = raw.replace(/<[^>]+>/g, ' ');

  // 2) Удаляем эмодзи
  raw = raw.replace(/[\u{1F300}-\u{1FAFF}]/gu, '');

  // 3) Удаляем лишние символы Telegram
  raw = raw.replace(/edited|Views|Telegram|instagram|Наш Сайт/gi, '');
  raw = raw.replace(/\s+/g, ' ');

  // 4) Разбиваем на строки
  const lines = raw.split(/[\n\r]+/).map(l => l.trim());

  // авто‑таймстамп
  const now = new Date();
  const dd = String(now.getDate()).padStart(2, '0');
  const mm = String(now.getMonth() + 1).padStart(2, '0');
  const yyyy = now.getFullYear();
  const hh = String(now.getHours()).padStart(2, '0');
  const min = String(now.getMinutes()).padStart(2, '0');

  const timestamp = `last_update,${dd}.${mm}.${yyyy} ${hh}:${min}`;

  let csv = timestamp + "\n";
  csv += "id,model,price\n";

  let id = 1;

  lines.forEach(line => {
    if (!line) return;

    // ищем строки с ценой
    if (!line.match(/\d+\s*BYN/i)) return;

    // заменяем длинные дефисы
    line = line.replace(/—/g, '-').replace(/–/g, '-');

    // убираем BYN
    line = line.replace(/BYN/gi, '').trim();

    // парсим модель и цену
    const parts = line.split('-');
    if (parts.length < 2) return;

    const model = parts[0].trim();
    let price = parseInt(parts[1].trim(), 10);

    if (isNaN(price)) return;

    // округление до десятков
    price = Math.round(price / 10) * 10;

    csv += `${id},${model},${price}\n`;
    id++;
  });

  document.getElementById('output').textContent = csv;
}
</script>

</body>
</html>
