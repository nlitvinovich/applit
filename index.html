<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>NLAppleLab Catalog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="style.css?v=11">
</head>

<body>

  <div class="search-bar-wrapper">
    <input id="search" type="text" placeholder="Поиск по моделям…">
  </div>

  <div id="update-time"></div>

  <div id="catalog"></div>

  <!-- Модальное окно корзины -->
  <div id="cart-modal" class="cart-modal">
    <div class="cart-content">
      <h2>Корзина</h2>
      <div id="cart-items"></div>
      <button id="cart-close">Закрыть</button>
    </div>
  </div>

  <!-- Нижний tab bar -->
  <div class="tabbar">
    <div class="tab-item active" id="tab-catalog">Каталог</div>
    <div class="tab-item" id="tab-cart">Корзина (0)</div>
  </div>

  <script src="app.js?v=11"></script>
</body>
</html>
