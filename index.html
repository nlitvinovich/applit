<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>applit Catalog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <h1 class="title">applit</h1>
  <input id="search" class="search" placeholder="Поиск по каталогу">
</header>

<div class="categories">
  <button class="cat-btn" data-cat="all">Все</button>
  <button class="cat-btn" data-cat="iPhone">iPhone</button>
  <button class="cat-btn" data-cat="iPad">iPad</button>
  <button class="cat-btn" data-cat="MacBook">MacBook</button>
  <button class="cat-btn" data-cat="Apple Watch">Watch</button>
  <button class="cat-btn" data-cat="AirPods">AirPods</button>
  <button class="cat-btn" data-cat="Accessory">Аксессуары</button>
</div>

<main id="products" class="products"></main>

<script src="app.js"></script>
</body>
</html>
