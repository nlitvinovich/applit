<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>NLAppleLab Catalog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="style.css?v=14">
</head>

<body>

  <!-- Поиск -->
  <div class="search-bar-wrapper">
    <input id="search" type="text" placeholder="Поиск по моделям…">
  </div>

  <!-- Время обновления -->
  <div id="update-time"></div>

  <!-- Каталог -->
  <div id="catalog"></div>

  <!-- Модальное окно корзины -->
  <div id="cart-modal" class="cart-modal">
    <div class="cart-content">

      <!-- Кнопка закрытия -->
      <button class="cart-close-btn" id="cart-close">×</button>

      <h2>Корзина</h2>

      <!-- Список товаров -->
      <div id="cart-items"></div>

      <!-- Итоговая сумма -->
      <div id="cart-total" class="cart-total"></div>

    </div>
  </div>

  <!-- Нижний таббар — только корзина -->
  <div class="tabbar">
    <div class="tab-item" id="tab-cart">
      🛒 Корзина
      <div class="tab-badge">0</div>
    </div>
  </div>

  <script src="app.js?v=14"></script>
</body>
</html>
