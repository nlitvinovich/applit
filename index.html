<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>appLit Catalog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="style.css?v=20">
</head>

<body>

  <!-- Поиск -->
  <div class="search-bar-wrapper">
    <input id="search" type="text" placeholder="Поиск по моделям…">
  </div>

  <!-- Верхняя строка: обновлено + поделиться + дисклеймер -->
  <div class="top-row">
    <div class="top-left">
      <div id="update-time"></div>
      <button id="share-catalog-btn" class="share-catalog-btn">Отправить каталог другу</button>
    </div>

    <div class="top-right">
      приложение носит исключительно информационный характер<br>
      и ни при каких условиях не является публичной офертой
    </div>
  </div>

  <!-- Каталог -->
  <div id="catalog"></div>

  <!-- Модальное окно корзины -->
  <div id="cart-modal" class="cart-modal">
    <div class="cart-content">

      <button class="cart-close-btn" id="cart-close">×</button>

      <h2>Корзина</h2>

      <div id="cart-items"></div>

      <div class="cart-bottom-row">
        <div id="cart-total" class="cart-total"></div>
        <button id="cart-order-btn" class="cart-order-btn">Заказать</button>
      </div>

    </div>
  </div>

  <!-- Таббар -->
  <div class="tabbar">
    <div class="tab-item" id="tab-cart">
      🛒 Корзина
      <div class="tab-badge">0</div>
    </div>
  </div>

  <script src="app.js?v=20"></script>
</body>
</html>
