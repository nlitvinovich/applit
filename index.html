<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Applit Catalog</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>Applit Catalog</h1>
  </header>

  <!-- Поиск -->
  <div style="padding: 15px;">
    <input 
      id="search"
      type="text"
      placeholder="Поиск..."
      style="width: 100%; padding: 12px; font-size: 16px; border-radius: 8px; border: 1px solid #ccc;"
      oninput="searchProducts()"
    >
  </div>

  <nav>
    <button onclick="filterCategory('iPhone')">iPhone</button>
    <button onclick="filterCategory('iPad')">iPad</button>
    <button onclick="filterCategory('MacBook')">MacBook</button>
    <button onclick="filterCategory('Apple Watch')">Watch</button>
    <button onclick="filterCategory('AirPods')">AirPods</button>
    <button onclick="filterCategory('Accessory')">Accessory</button>
  </nav>

  <div id="catalog"></div>

  <script src="app.js"></script>

</body>
</html>
